{% extends 'base.html' %}
{% block title %}ShopEasy - Login{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-8 col-md-5">
            <div class="card">
                <div class="card-body p-4">
                    <h1 class="h4 text-center mb-4">Login</h1>

                    <form method="POST" action="{{ url_for('login') }}" novalidate>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   value="{{ email or '' }}" placeholder="Enter your email">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="Enter your password">
                                <button class="btn btn-outline-secondary" type="button" id="toggle-password">Show</button>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark">Login</button>
                        </div>
                    </form>

                    <p class="text-center small mt-3 mb-0">
                        Don't have an account? <a href="{{ url_for('register') }}">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='login.js') }}"></script>
{% endblock %}
