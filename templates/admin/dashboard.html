{% extends 'admin/base_admin.html' %}
{% block title %}Admin Dashboard{% endblock %}

{% block content %}
<h1 class="h3 mb-4">Dashboard</h1>
<div class="row g-4">
    <div class="col-md-4">
        <div class="card text-center shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Categories</h5>
                <p class="display-6 fw-bold">{{ total_categories }}</p>
                <a href="{{ url_for('admin.categories') }}" class="btn btn-sm btn-dark">Manage</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Subcategories</h5>
                <p class="display-6 fw-bold">{{ total_subcategories }}</p>
                <a href="{{ url_for('admin.subcategories') }}" class="btn btn-sm btn-dark">Manage</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center shadow-sm">
            <div class="card-body">
                <h5 class="card-title">Products</h5>
                <p class="display-6 fw-bold">{{ total_products }}</p>
                <a href="{{ url_for('admin.products') }}" class="btn btn-sm btn-dark">Manage</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
