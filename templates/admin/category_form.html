{% extends 'admin/base_admin.html' %}
{% block title %}{{ action }} Category{% endblock %}

{% block content %}
<h1 class="h3 mb-4">{{ action }} Category</h1>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control"
                       value="{{ category.name if category else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ category.description if category else '' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Image URL</label>
                <input type="text" name="image" class="form-control"
                       value="{{ category.image if category else '' }}" placeholder="https://...">
            </div>
            <button type="submit" class="btn btn-dark">{{ action }}</button>
            <a href="{{ url_for('admin.categories') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
