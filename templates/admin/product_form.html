{% extends 'admin/base_admin.html' %}
{% block title %}{{ action }} Product{% endblock %}

{% block content %}
<h1 class="h3 mb-4">{{ action }} Product</h1>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control"
                       value="{{ product.name if product else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Subcategory</label>
                <select name="subcategory_id" class="form-select" required>
                    <option value="">-- Select Subcategory --</option>
                    {% for sub in subcategories %}
                    <option value="{{ sub.id }}"
                        {% if product and product.subcategory_id == sub.id %}selected{% endif %}>
                        {{ sub.parent.name }} → {{ sub.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Price (Rs.)</label>
                <input type="number" name="price" class="form-control" step="0.01"
                       value="{{ product.price if product else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Stock</label>
                <input type="number" name="stock" class="form-control"
                       value="{{ product.stock if product else '0' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Discount %</label>
                <input type="number" name="discount_percent" class="form-control"
                       value="{{ product.discount_percent if product else '0' }}" min="0" max="100">
            </div>
            <div class="mb-3">
                <label class="form-label">Image URL</label>
                <input type="text" name="image" class="form-control"
                       value="{{ product.image if product else '' }}" placeholder="https://...">
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea name="description" class="form-control" rows="3">{{ product.description if product else '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-dark">{{ action }}</button>
            <a href="{{ url_for('admin.products') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
