{% extends 'base.html' %}
{% block title %}ShopEasy - Sign Up{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-6">
            <div class="card">
                <div class="card-body p-4">
                    <h1 class="h4 text-center mb-4">Create an Account</h1>

                    <form method="POST" action="{{ url_for('register') }}" novalidate>
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" name="name"
                                   value="{{ name or '' }}" placeholder="Your full name">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   value="{{ email or '' }}" placeholder="you@example.com">
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label">Phone</label>
                            <input type="text" class="form-control" id="phone" name="phone"
                                   value="{{ phone or '' }}" placeholder="Phone number">
                        </div>
                        <div class="mb-3">
                            <label for="address" class="form-label">Address</label>
                            <input type="text" class="form-control" id="address" name="address"
                                   value="{{ address or '' }}" placeholder="Your address">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="At least 6 characters">
                                <button class="btn btn-outline-secondary" type="button" id="toggle-password">Show</button>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark">Sign Up</button>
                        </div>
                    </form>

                    <p class="text-center small mt-3 mb-0">
                        Already have an account? <a href="{{ url_for('login') }}">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='login.js') }}"></script>
{% endblock %}
